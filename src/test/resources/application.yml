spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop

llm:
  gateway:
    api-key-header: Authorization
    seed:
      enabled: true
      api-key: test-api-key
      name: Test seed key
    providers:
      mode: mock
      openai:
        enabled: false
        base-url: http://localhost:18080
        api-key: test-openai-key
      anthropic:
        enabled: false
        base-url: http://localhost:18081
        api-key: test-anthropic-key
      google:
        enabled: false
        base-url: http://localhost:18082
        api-key: test-google-key
    routing:
      failure-threshold: 1
      cooldown-millis: 30000
    sync:
      enabled: false
      fixed-delay-millis: 3600000
    request-log:
      payload-sampling-enabled: true
      sample-rate: 1.0
      max-body-chars: 2048
      store-response-payload: true
      redacted-fields:
        - authorization
        - api_key
        - apiKey
        - x-api-key
        - token
        - access_token
        - refresh_token
        - client_secret
    mcp:
      tool-scopes:
        chat: mcp.tool.chat
        list-models: mcp.tool.list-models
        generate-image: mcp.tool.generate-image
        generate-nano-banana: mcp.tool.generate-nano-banana
        list-image-models: mcp.tool.list-image-models
