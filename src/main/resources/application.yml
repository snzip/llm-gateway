spring:
  application:
    name: llmgatejava
  datasource:
    url: jdbc:h2:mem:llmgateway;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /json
  swagger-ui:
    path: /docs

llm:
  gateway:
    api-key-header: Authorization
    seed-api-key: test-api-key
    providers:
      mode: mock
      openai:
        enabled: false
        base-url: https://api.openai.com
        api-key:
      anthropic:
        enabled: false
        base-url: https://api.anthropic.com
        api-key:
      google:
        enabled: false
        base-url: https://generativelanguage.googleapis.com
        api-key:
    routing:
      failure-threshold: 1
      cooldown-millis: 30000
    sync:
      enabled: false
      fixed-delay-millis: 3600000
      conflict-policy: OVERRIDE_MANUAL
    aggregation:
      enabled: false
      fixed-delay-millis: 900000
      cache-ttl-millis: 30000
      retention-days: 30
    probe:
      enabled: false
      fixed-delay-millis: 300000
