spring:
  application:
    name: llmgatejava
  datasource:
    url: jdbc:h2:mem:llmgateway;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /json
  swagger-ui:
    path: /docs

llm:
  gateway:
    api-key-header: ${LLM_GATEWAY_API_KEY_HEADER:Authorization}
    seed:
      enabled: ${LLM_GATEWAY_SEED_ENABLED:false}
      api-key: ${LLM_GATEWAY_SEED_API_KEY:test-api-key}
      name: ${LLM_GATEWAY_SEED_NAME:Seed key}
    providers:
      mode: ${LLM_GATEWAY_PROVIDER_MODE:mock}
      openai:
        enabled: ${OPENAI_ENABLED:false}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com}
        api-key: ${OPENAI_API_KEY:dev-openai-key}
      anthropic:
        enabled: ${ANTHROPIC_ENABLED:false}
        base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
        api-key: ${ANTHROPIC_API_KEY:dev-anthropic-key}
      google:
        enabled: ${GOOGLE_ENABLED:false}
        base-url: ${GOOGLE_BASE_URL:https://generativelanguage.googleapis.com}
        api-key: ${GOOGLE_API_KEY:dev-google-key}
    routing:
      failure-threshold: 1
      cooldown-millis: 30000
    sync:
      enabled: false
      fixed-delay-millis: 3600000
      conflict-policy: OVERRIDE_MANUAL
    aggregation:
      enabled: false
      fixed-delay-millis: 900000
      cache-ttl-millis: 30000
      retention-days: 30
    probe:
      enabled: false
      fixed-delay-millis: 300000
